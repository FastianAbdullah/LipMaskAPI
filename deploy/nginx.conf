# /etc/nginx/sites-available/lip-seg-api
#
# Replace lip.qubiloo.cloud below.
# Get TLS certs first with:   sudo certbot --nginx -d lip.qubiloo.cloud

# ── Rate limit zone: 30 requests/minute per IP ──────────────────────────────
limit_req_zone $binary_remote_addr zone=lipseg_rl:10m rate=30r/m;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lip.qubiloo.cloud;
    return 301 https://$host$request_uri;
}

# ── HTTPS service ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lip.qubiloo.cloud;

    # Certs (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/lip.qubiloo.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lip.qubiloo.cloud/privkey.pem;

    # Modern TLS only
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Allow ~10 MB image uploads (must match max_image_bytes in app config)
    client_max_body_size 12m;
    client_body_timeout 60s;

    # Hide nginx version
    server_tokens off;

    # ── Endpoints ───────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8003;
        access_log off;
    }

    location / {
        # Apply rate limit; allow short bursts
        limit_req zone=lipseg_rl burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
